# docker-compose.yml (Modified for Render Deployment)

services:
  db: # This service definition is mainly for dependency linking now
    image: postgres:15-alpine
    container_name: webhook_db_render_placeholder # Renamed to avoid confusion
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-webhook_svc}
    # No ports needed for managed DB on Render
    volumes:
      - postgres_data:/var/lib/postgresql/data # Volume definition is okay, but Render uses its own managed disk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webhook_svc}"]
      interval: 10s # Slightly longer interval for Render checks
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis: # This service definition is mainly for dependency linking now
    image: redis:6-alpine
    container_name: webhook_redis_render_placeholder # Renamed to avoid confusion
    # No ports needed for managed Redis on Render
    volumes:
      - redis_data:/data # Volume definition is okay, but Render uses its own managed disk
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s # Slightly longer interval
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: webhook_api_render # Renamed for clarity
    # Command WITHOUT --reload
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    # No host port mapping needed
    # No local volumes needed
    env_file:
      - .env # Still useful for referencing variable names
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: webhook_worker_render # Renamed for clarity
    command: rq worker deliveries
    # No local volumes needed
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # These volume definitions are not directly used by Render for managed services
  # but are kept for docker-compose validation if needed.
  postgres_data: {}
  redis_data: {}
